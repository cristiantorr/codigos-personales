<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <div class="max-w-lg mx-auto bg-white p-8 rounded-2xl shadow-lg text-gray-800">
    <h2 class="text-2xl font-semibold mb-4 text-center">Mortgage Calculator</h2>

    <p><strong>Home Price:</strong> $900,000</p>
    <p><strong>Down Payment:</strong> 20%</p>
    <p><strong>Down Payment Amount:</strong> $100,000</p>
    <p><strong>Loan Amount:</strong> $400,000</p>
    <p><strong>Amortization Period:</strong> 25 years</p>
    <p><strong>Interest Rate:</strong> 5.5%</p>

    <hr class="my-4">

    <div id="results" class="text-lg font-medium text-emerald-700 text-center"></div>
  </div>

  <script>
    // ======== DATOS DE ENTRADA ========
    const homePrice = 900000;           // Precio de la casa
    const downPaymentPercent = 20;      // % de down payment
    const interestRate = 6.2;           // % tasa anual
    const amortizationYears = 10;       // años del préstamo

    // ======== CÁLCULOS ========
    // 1️⃣ Monto del down payment
    const downPaymentAmount = homePrice * (downPaymentPercent / 100);

    // 2️⃣ Loan Amount (lo que se financia)
    const loanAmount = homePrice - downPaymentAmount;

    // 3️⃣ Tasa mensual y número de pagos
    const monthlyRate = (interestRate / 100) / 12;
    const totalPayments = amortizationYears * 12;

    // 4️⃣ Fórmula del pago mensual
    const monthlyPayment = loanAmount * (monthlyRate * Math.pow(1 + monthlyRate, totalPayments)) /
      (Math.pow(1 + monthlyRate, totalPayments) - 1);

    // 5️⃣ Pago quincenal (aproximado)
    const biweeklyPayment = monthlyPayment / 2;

    // ======== MOSTRAR RESULTADOS ========
    document.getElementById("results").innerHTML = `
  <p>📅 Monthly Payment: <strong>$${monthlyPayment.toLocaleString('en-US', { maximumFractionDigits: 0 })}</strong></p>
  <p>🗓️ Bi-Weekly Payment: <strong>$${biweeklyPayment.toLocaleString('en-US', { maximumFractionDigits: 0 })}</strong></p>
  <hr class="my-3">
  <p class="text-gray-600">Loan Amount: $${loanAmount.toLocaleString('en-US')}</p>
  <p class="text-gray-600">Down Payment: $${downPaymentAmount.toLocaleString('en-US')} (${downPaymentPercent}%)</p>
  <p class="text-gray-600">Amortization: ${amortizationYears} years</p>
  <p class="text-gray-600">Interest Rate: ${interestRate}%</p>
`;
  </script>

</body>

</html>
